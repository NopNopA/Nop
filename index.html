<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NopNop RESEARCH</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet" />
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" />

    <style>
        :root {
            --primary-blue: #004d99;
            --light-blue: #00aaff;
            --bg-dark: #050a15;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            overflow-x: hidden;
            line-height: 1.6;
            width: 100%;
        }

        /* Background */
        #particles-js {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: -3;
            background: radial-gradient(circle at center, #0a192f 0%, #050a15 100%);
        }

        /* Navigation */
        nav {
            padding: 1.5rem 5%; /* ปรับ padding เริ่มต้น */
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 100;
            background: rgba(5, 10, 21, 0.85);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        @media (min-width: 1024px) {
            nav { padding: 2rem 10%; }
        }

        .logo-text {
            font-weight: 700;
            font-size: clamp(1.2rem, 4vw, 1.5rem);
            letter-spacing: 2px;
            color: var(--light-blue);
        }

        /* Hero Section */
        .hero {
            min-height: 100vh; /* ใช้ min-height แทน height ตายตัว */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 120px 20px 60px 20px;
            position: relative;
        }

        .hero h1 {
            font-size: clamp(2.5rem, 10vw, 5rem); /* ปรับขนาดให้เล็กลงในมือถือแต่ใหญ่ใน desktop */
            background: linear-gradient(to right, #ffffff, var(--light-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
            text-transform: none;
            letter-spacing: clamp(2px, 2vw, 5px);
            line-height: 1.1;
        }

        .hero p {
            font-size: clamp(1rem, 3vw, 1.2rem);
            color: #8892b0;
            max-width: 650px;
            margin-bottom: 2rem;
        }

        /* Section Content */
        .content-section {
            padding: 60px 5%;
            position: relative;
            z-index: 2;
        }

        @media (min-width: 1024px) {
            .content-section { padding: 100px 10%; }
        }

        .grid {
            display: grid;
            /* ปรับ minmax ให้การ์ดเล็กลงได้ถึง 280px */
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
        }

        .card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            padding: clamp(25px, 5vw, 40px);
            border-radius: 24px;
            backdrop-filter: blur(12px);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-10px);
            border-color: var(--light-blue);
            box-shadow: 0 10px 30px rgba(0, 170, 255, 0.15);
        }

        .card h3 {
            color: var(--light-blue);
            margin-bottom: 15px;
            font-size: 1.5rem;
        }

        .card p {
            color: #b4c0d9;
            font-size: 0.95rem;
        }

        /* Footer */
        footer {
            padding: 60px 10%;
            text-align: center;
            border-top: 1px solid rgba(255,255,255,0.08);
            margin-top: 50px;
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(10px);
            position: relative;
            z-index: 5;
        }

        .make-by {
            font-weight: 400;
            letter-spacing: 1px;
            color: #d6e3ff;
            font-size: clamp(0.8rem, 2vw, 1rem);
        }

        .make-by span {
            color: #00c3ff;
            font-weight: 700;
            text-shadow: 0 0 10px rgba(0,195,255,0.7);
        }

        /* Decoration */
        .circle-dec {
            position: absolute;
            width: clamp(150px, 30vw, 250px);
            height: clamp(150px, 30vw, 250px);
            background: var(--primary-blue);
            filter: blur(80px);
            border-radius: 50%;
            z-index: -1;
            opacity: 0.3;
        }

        /* Meteor Effect - ซ่อนในหน้าจอเล็กมากเพื่อลดภาระเครื่อง */
        .meteor-container {
            position: fixed;
            inset: 0;
            overflow: hidden;
            pointer-events: none;
            z-index: -2;
        }

        .meteor {
            position: absolute;
            top: -120px;
            width: 2px;
            height: 80px;
            background: linear-gradient(to bottom, rgba(255,255,255,0), var(--light-blue), #fff);
            border-radius: 999px;
            transform: rotate(225deg);
            animation: meteor-fall linear infinite;
            opacity: 0;
        }

        @keyframes meteor-fall {
            0% { transform: translate(0, 0) rotate(225deg); opacity: 0; }
            10% { opacity: 1; }
            100% { transform: translate(-100vw, 100vh) rotate(225deg); opacity: 0; }
        }

        /* ปรับตำแหน่ง Meteor ให้กระจายตัวดีขึ้น */
        .meteor:nth-child(1) { left: 20%; animation-duration: 6s; animation-delay: 0s; }
        .meteor:nth-child(2) { left: 50%; animation-duration: 9s; animation-delay: 2s; }
        .meteor:nth-child(3) { left: 80%; animation-duration: 7s; animation-delay: 4s; }
        .meteor:nth-child(4) { left: 95%; animation-duration: 11s; animation-delay: 1s; }
        .meteor:nth-child(5) { left: 5%; animation-duration: 8s; animation-delay: 6s; }

    </style>
</head>
<body>

    <div id="particles-js"></div>

    <div class="meteor-container">
        <span class="meteor"></span>
        <span class="meteor"></span>
        <span class="meteor"></span>
        <span class="meteor"></span>
        <span class="meteor"></span>
    </div>

    <nav>
        <div class="logo-text">NopNop*</div>
        <div style="font-size: 0.7rem; color: #8892b0; font-weight: bold;">
            EST. 2026
        </div>
    </nav>

    <section class="hero">
        <div class="circle-dec" style="top: 20%; left: 10%;"></div>
        
        <h1 data-aos="zoom-out" data-aos-duration="1200">
            NopNop <br />
            ReseaRCH
        </h1>

        <p data-aos="fade-up" data-aos-delay="400">
            Decoding the complexity of data through advanced neural
            connectivity and innovative research methodologies.
        </p>

        <div style="width: 2px; height: 80px; background: linear-gradient(to bottom, var(--light-blue), transparent); margin-top: 20px;"></div>
    </section>

    <section class="content-section">
        <div class="grid">
            <div class="card" data-aos="fade-up" data-aos-delay="100">
                <h3>Innovation</h3>
                <p>x</p>
            </div>

            <div class="card" data-aos="fade-up" data-aos-delay="200">
                <h3>Connectivity</h3>
                <p>x</p>
            </div>

            <div class="card" data-aos="fade-up" data-aos-delay="300">
                <h3>Precision</h3>
                <p>x</p>
            </div>
        </div>
    </section>

    <footer>
        <p class="make-by" data-aos="fade-in">
            Made By 
            <span>NopNop</span>, 
            <span>NopNopA</span>
        </p>
    </footer>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

    <script>
        // AOS
        AOS.init({
            duration: 1000,
            once: true,
            offset: 100
        });

        // Scroll Restoration
        if ('scrollRestoration' in history) {
            history.scrollRestoration = 'manual';
        }
        window.scrollTo(0, 0);

        // Particles config ( optimized for mobile )
        particlesJS("particles-js", {
            particles: {
                number: { value: window.innerWidth < 768 ? 40 : 80 },
                color: { value: "#00aaff" },
                shape: { type: "circle" },
                opacity: { value: 0.4 },
                size: { value: 2 },
                line_linked: {
                    enable: true,
                    distance: 150,
                    color: "#00aaff",
                    opacity: 0.15,
                    width: 1
                },
                move: {
                    enable: true,
                    speed: 1.5,
                    direction: "none",
                    out_mode: "out"
                }
            },
            interactivity: {
                detect_on: "canvas",
                events: {
                    onhover: { enable: true, mode: "grab" },
                    onclick: { enable: true, mode: "push" }
                }
            }
        });
    </script>
</body>
</html>
